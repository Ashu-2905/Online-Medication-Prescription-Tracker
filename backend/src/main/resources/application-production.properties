# Production Configuration for Medication Tracker Backend

# Server Configuration
server.port=8080

# MongoDB Configuration - EXPLICIT ATLAS CONNECTION
spring.data.mongodb.uri=mongodb+srv://username:password@.../medication_tracker_project

# DISABLE LOCAL MONGODB - FORCE ATLAS ONLY
spring.data.mongodb.auto-index-creation=true
spring.data.mongodb.database=medication_tracker_project

# MongoDB Connection Settings
spring.data.mongodb.client-uri=mongodb+srv://username:password@.../medication_tracker_project

# Disable Embedded MongoDB
spring.mongodb.embedded.version=disabled

# Enable MongoDB logging for debugging
logging.level.org.mongodb.driver=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG

# JWT Configuration (Production)
jwt.secret=your_secret_key
jwt.expiration=86400

# CORS Configuration for Production Frontend
spring.web.cors.allowed-origins=http://localhost:5173,https://your-production-domain.com
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true

# Production Logging
logging.level.com.medtracker=INFO
logging.level.org.springframework.security=WARN

# Performance Settings
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Database Connection Pool
spring.data.mongodb.repositories.enabled=true


# Groq AI Configuration
groq.api.key=your_secret_key
